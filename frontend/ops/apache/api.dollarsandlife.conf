<VirtualHost *:80>
    ServerName api.dollarsandlife.com

    RewriteEngine On
    RewriteRule ^(.*)$ https://api.dollarsandlife.com%{REQUEST_URI} [L,R=permanent,NE]

    ErrorLog ${APACHE_LOG_DIR}/api_dollarsandlife_error.log
    CustomLog ${APACHE_LOG_DIR}/api_dollarsandlife_access.log combined
RewriteCond %{SERVER_NAME} =api.dollarsandlife.com
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
