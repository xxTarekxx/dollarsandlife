<IfModule mod_ssl.c>

<VirtualHost *:80>
ServerName dollarsandlife.com
ServerAlias [www.dollarsandlife.com](http://www.dollarsandlife.com)


RewriteEngine On
RewriteRule ^ https://www.dollarsandlife.com%{REQUEST_URI} [L,R=301]

ErrorLog ${APACHE_LOG_DIR}/dollarsandlife_error.log
CustomLog ${APACHE_LOG_DIR}/dollarsandlife_access.log combined


</VirtualHost>

<VirtualHost *:443>

ServerName dollarsandlife.com
ServerAlias www.dollarsandlife.com

SSLEngine on
Include /etc/letsencrypt/options-ssl-apache.conf

DirectorySlash Off

ProxyPreserveHost On
ProxyRequests Off

# API → Node backend
ProxyPass /api http://localhost:5001/api
ProxyPassReverse /api http://localhost:5001/api

# Frontend → Next.js
ProxyPass / http://localhost:3000/ nocanon
ProxyPassReverse / http://localhost:3000/

RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Host expr=%{HTTP_HOST}

<IfModule mod_headers.c>
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</IfModule>

ErrorLog ${APACHE_LOG_DIR}/dollarsandlife_ssl_error.log
CustomLog ${APACHE_LOG_DIR}/dollarsandlife_ssl_access.log combined

SSLCertificateFile /etc/letsencrypt/live/dollarsandlife.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/dollarsandlife.com/privkey.pem


</VirtualHost>

</IfModule>
